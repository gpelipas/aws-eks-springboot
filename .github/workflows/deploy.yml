name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options: [prod, staging]

env:
  AWS_REGION:    us-east-1
  ECR_REGISTRY:  ${{ secrets.ECR_REGISTRY }}
  ECR_REPO:      url-shortener
  EKS_CLUSTER:   url-shortener-prod-cluster
  HELM_RELEASE:  prod
  NAMESPACE:     prod

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Required for OIDC auth to AWS
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Debug OIDC token
        run: |
          echo "Role ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}"
          curl -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq .

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPO:prod-latest \
            .

      - name: Push to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO:prod-latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name $EKS_CLUSTER \
            --region $AWS_REGION

      - name: Create namespace if missing
        run: kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          helm upgrade --install $HELM_RELEASE ./helm/url-shortener \
            --namespace $NAMESPACE \
            --set image.repository=$ECR_REGISTRY/$ECR_REPO \
            --set image.tag=$IMAGE_TAG \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ secrets.IRSA_ROLE_ARN }} \
            --set env.SPRING_DATASOURCE_URL=${{ secrets.DB_URL }} \
            --set env.SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }} \
            --set-string dbPassword=$(echo -n "${{ secrets.DB_PASSWORD }}" | base64) \
            --wait \
            --timeout 5m \
            --atomic   # Auto-rollback on failure

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/$HELM_RELEASE-url-shortener \
            -n $NAMESPACE \
            --timeout=3m

      - name: Print deployed image
        run: |
          echo "Deployed: $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG"

  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Post failure summary
        run: |
          echo "::error::Deployment failed for commit ${{ github.sha }}"
          echo "Check the deploy job logs for details."